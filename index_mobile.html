
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Game Order Timer</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #0f0f0f;
    color: #00ffcc;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 400px;
}

#clock {
    font-size: 9vw;
    word-break: break-word;
}

#nextTime {
    margin-top: 15px;
    font-size: 5vw;
    color: #ffffff;
}

#countdown {
    margin-top: 15px;
    font-size: 8vw;
    color: #ffcc00;
}

button {
    margin-top: 25px;
    padding: 15px;
    width: 100%;
    font-size: 5vw;
    border: none;
    background: #00ffcc;
    color: #000;
    font-weight: bold;
    border-radius: 8px;
}

button:active {
    transform: scale(0.98);
}
</style>
</head>

<body>

<div class="container">
    <div id="clock">00:00:00.000</div>
    <div id="nextTime">Следующий заказ: --:--</div>
    <div id="countdown">00:00</div>
    <button onclick="startTimers()">Запустить таймеры</button>
</div>

<script>
let interval;
let notificationPermission = false;

// Accurate clock with milliseconds
function updateClock() {
    let now = new Date();
    let h = String(now.getHours()).padStart(2, '0');
    let m = String(now.getMinutes()).padStart(2, '0');
    let s = String(now.getSeconds()).padStart(2, '0');
    let ms = String(now.getMilliseconds()).padStart(3, '0');
    document.getElementById("clock").innerText = `${h}:${m}:${s}.${ms}`;
}
setInterval(updateClock, 10);

// Get next 03,13,23,33,43,53 minute mark
function getNextTargetTime() {
    let now = new Date();
    let minutes = now.getMinutes();
    let nextMinute = 3;

    while (nextMinute <= minutes) {
        nextMinute += 10;
    }

    if (nextMinute >= 60) {
        now.setHours(now.getHours() + 1);
        nextMinute = 3;
    }

    now.setMinutes(nextMinute);
    now.setSeconds(0);
    now.setMilliseconds(0);
    return now;
}

function startTimers() {

    if (Notification.permission !== "granted") {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                notificationPermission = true;
            }
        });
    } else {
        notificationPermission = true;
    }

    let target = getNextTargetTime();
    updateNextTimeDisplay(target);

    clearInterval(interval);

    interval = setInterval(() => {
        let now = new Date();
        let diff = target - now;

        if (diff <= 0) {

            if (notificationPermission) {
                new Notification("ВРЕМЯ ЗАКАЗА!", {
                    body: "Пора ловить заказ!"
                });
            }

            target = getNextTargetTime();
            updateNextTimeDisplay(target);
        }

        let minutes = Math.floor(diff / 60000);
        let seconds = Math.floor((diff % 60000) / 1000);

        document.getElementById("countdown").innerText =
            String(minutes).padStart(2, '0') + ":" +
            String(seconds).padStart(2, '0');

    }, 50);
}

function updateNextTimeDisplay(target) {
    document.getElementById("nextTime").innerText =
        "Следующий заказ: " +
        String(target.getHours()).padStart(2, '0') + ":" +
        String(target.getMinutes()).padStart(2, '0');
}
</script>

</body>
</html>
